<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedAI - AI Medical First Responder</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
background:#020617;
color:white;
overflow-x:hidden;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:radial-gradient(circle at top,#1e293b,#020617);
}

.hero h1{
font-size:64px;
background:linear-gradient(90deg,#22c55e,#38bdf8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
max-width:650px;
color:#cbd5f5;
margin-top:20px;
}

section{
padding:100px 60px;
}

.section-title{
text-align:center;
font-size:40px;
margin-bottom:60px;
}

/* NETWORK */

#networkMap{
height:420px;
border-radius:16px;
border:1px solid #1e293b;
position:relative;
overflow:hidden;
background:#020617;
}

/* rotating globe */

#globe{
position:absolute;
width:900px;
opacity:.25;
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:spin 60s linear infinite;
}

@keyframes spin{
from{transform:translate(-50%,-50%) rotate(0deg);}
to{transform:translate(-50%,-50%) rotate(360deg);}
}

/* AI core */

#core{
position:absolute;
width:24px;
height:24px;
background:#22c55e;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
box-shadow:0 0 20px #22c55e;
z-index:5;
}

/* phone nodes */

.phone{
position:absolute;
width:8px;
height:8px;
background:#38bdf8;
border-radius:50%;
box-shadow:0 0 12px #38bdf8;
}

/* connection line */

.line{
position:absolute;
height:2px;
background:#22c55e;
transform-origin:left center;
opacity:.5;
}

/* data pulse */

.pulse{
position:absolute;
width:6px;
height:6px;
background:#22c55e;
border-radius:50%;
box-shadow:0 0 10px #22c55e;
}

/* counter */

.counter{
text-align:center;
margin-top:25px;
font-size:26px;
color:#22c55e;
}

footer{
text-align:center;
padding:40px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="hero">

<h1>MedAI</h1>

<p>
The AI-powered medical assistant that detects injuries, gives treatment guidance,
and calls help when you can't.
</p>

</div>

<section>

<h2 class="section-title">Global MedAI Network</h2>

<div id="networkMap">

<img id="globe"
src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg">

<div id="core"></div>

</div>

<div class="counter">
Active MedAI Users: <span id="userCount">1243</span>
</div>

</section>

<footer>

MedAI • AI First Responder System

</footer>

<script>

const map = document.getElementById("networkMap")
const core = document.getElementById("core")
const counter = document.getElementById("userCount")

let users = 1243

function createPhone(){

const phone = document.createElement("div")
phone.className="phone"

const x=Math.random()*90+5
const y=Math.random()*80+10

phone.style.left=x+"%"
phone.style.top=y+"%"

map.appendChild(phone)

/* connection line */

const line=document.createElement("div")
line.className="line"

const coreX=50
const coreY=50

const dx=coreX-x
const dy=coreY-y

const length=Math.sqrt(dx*dx+dy*dy)

line.style.width=length+"%"
line.style.left=x+"%"
line.style.top=y+"%"

const angle=Math.atan2(dy,dx)*(180/Math.PI)

line.style.transform="rotate("+angle+"deg)"

map.appendChild(line)

/* data pulse */

const pulse=document.createElement("div")
pulse.className="pulse"

pulse.style.left=x+"%"
pulse.style.top=y+"%"

map.appendChild(pulse)

let step=0

const interval=setInterval(()=>{

step+=0.02

pulse.style.left=(x+(50-x)*step)+"%"
pulse.style.top=(y+(50-y)*step)+"%"

if(step>=1){
pulse.remove()
clearInterval(interval)
}

},30)

/* update counter */

users++
counter.innerText=users

}

/* new phones appear */

setInterval(createPhone,2000)

</script>

</body>
</html>
